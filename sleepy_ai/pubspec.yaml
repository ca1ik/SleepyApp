name: sleepy_ai
description: "SleepyApp - Sleep Optimization & Tracking for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  get: ^4.6.6
  provider: ^6.1.2
  equatable: ^2.0.5

  # ── Firebase (scaffolding — google-services.json eklenince aktif olur) ──
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # ── Audio ─────────────────────────────────────────────────────────────────
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # ── In-App Purchase (PRO üyelik) ──────────────────────────────────────────
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.3.6

  # ── Charts & Visualization ────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── UI & Animations ───────────────────────────────────────────────────────
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

  # ── Local Storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # ── Permissions & Notifications ───────────────────────────────────────────
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2

  # ── Functional Programming ────────────────────────────────────────────────
  dartz: ^0.10.1

  # ── Utilities ─────────────────────────────────────────────────────────────
  logger: ^2.4.0
  uuid: ^4.5.1
  intl: 0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true  # l10n için gerekli

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700